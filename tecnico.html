<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Técnico</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f3f6;
}

/* TOPO */
.topbar {
  background: #1f2937;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}

/* FILTROS */
.filtros {
  background: white;
  padding: 10px;
  display: grid;
  gap: 8px;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* CONTADORES */
.contadores {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.contador-card {
  background: white;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.contador-top {
  font-size: 12px;
  color: #777;
}

.contador-numero {
  font-size: 22px;
  font-weight: bold;
  margin-top: 5px;
}

.azul { border-left: 5px solid #2196f3; }
.laranja { border-left: 5px solid #ff9800; }
.amarelo { border-left: 5px solid #ffc107; }
.verde { border-left: 5px solid #4caf50; }

/* LISTA */
.lista {
  padding: 10px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.card:active {
  transform: scale(0.97);
}

.card-top {
  display: flex;
  justify-content: space-between;
}

.placa {
  font-size: 18px;
  font-weight: bold;
}

.status {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: white;
}

.status.azul { background: #2196f3; }
.status.laranja { background: #ff9800; }
.status.amarelo { background: #ffc107; color: black; }
.status.verde { background: #4caf50; }

.info {
  margin-top: 5px;
  color: #555;
}

/* BOTÃO EXCLUIR */
.excluir {
  background: #f44336;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 6px;
  margin-top: 10px;
}

</style>

</head>

<body>

<div class="topbar">🛠️ Técnico</div>

<div class="filtros">
  <input id="busca" placeholder="Buscar por placa">

  <select id="filtroTipo">
    <option value="">Todos os tipos</option>
    <option value="carreta">Carreta</option>
    <option value="prancha">Prancha</option>
    <option value="comboio">Comboio</option>
    <option value="cavalo">Cavalo</option>
  </select>

  <select id="filtroStatus">
    <option value="">Todos status</option>
    <option value="em_inspecao">Em inspeção</option>
    <option value="aguardando_manutencao">Aguardando</option>
    <option value="em_manutencao">Manutenção</option>
    <option value="liberado">Liberado</option>
  </select>
</div>

<div class="contadores" id="contadores"></div>

<div class="lista" id="lista"></div>

<link rel="stylesheet" href="navbar.css">
</div>

<script type="module">

import { protegerPagina } from "./auth.js";

protegerPagina(["tecnico"]);

import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  query,
  where,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let dados = [];

// 🎨 STATUS
function getStatusInfo(status) {
  switch(status) {
    case "em_inspecao": return { nome: "Inspeção", cor: "azul" };
    case "aguardando_manutencao": return { nome: "Aguardando", cor: "laranja" };
    case "em_manutencao": return { nome: "Manutenção", cor: "amarelo" };
    case "liberado": return { nome: "Liberado", cor: "verde" };
  }
}

// 🔢 CONTADORES
function atualizarContadores(lista) {

  const cont = {
    em_inspecao: 0,
    aguardando_manutencao: 0,
    em_manutencao: 0,
    liberado: 0
  };

  lista.forEach(i => cont[i.status]++);

  document.getElementById("contadores").innerHTML = `
    <div class="contador-card azul">
      <div class="contador-top">Inspeção</div>
      <div class="contador-numero">${cont.em_inspecao}</div>
    </div>

    <div class="contador-card laranja">
      <div class="contador-top">Aguardando</div>
      <div class="contador-numero">${cont.aguardando_manutencao}</div>
    </div>

    <div class="contador-card amarelo">
      <div class="contador-top">Manutenção</div>
      <div class="contador-numero">${cont.em_manutencao}</div>
    </div>

    <div class="contador-card verde">
      <div class="contador-top">Liberado</div>
      <div class="contador-numero">${cont.liberado}</div>
    </div>
  `;
}

// 🚀 CARREGAR
async function carregar() {

  const snap = await getDocs(collection(db, "implementos"));

  dados = [];

  snap.forEach(d => {
    dados.push({ id: d.id, ...d.data() });
  });

  aplicarFiltros();
}

// 🔎 FILTRO AUTOMÁTICO
function aplicarFiltros() {

  const busca = document.getElementById("busca").value.toLowerCase();
  const tipo = document.getElementById("filtroTipo").value;
  const status = document.getElementById("filtroStatus").value;

  let resultado = dados;

  if (busca) {
    resultado = resultado.filter(i =>
      i.placa.toLowerCase().includes(busca)
    );
  }

  if (tipo) {
    resultado = resultado.filter(i => i.tipo === tipo);
  }

  if (status) {
    resultado = resultado.filter(i => i.status === status);
  }

  render(resultado);
}

// 🎯 RENDER
function render(lista) {

  atualizarContadores(lista);

  const container = document.getElementById("lista");
  container.innerHTML = "";

  lista.forEach(item => {

    const status = getStatusInfo(item.status);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="card-top">
        <div class="placa">${item.placa}</div>
        <div class="status ${status.cor}">${status.nome}</div>
      </div>

      <div class="info">
        Tipo: ${item.tipo}
      </div>

      <button class="excluir" onclick="event.stopPropagation(); excluir('${item.id}')">
        Excluir
      </button>
    `;

    div.onclick = () => {
      window.location = "detalhe.html?id=" + item.id;
    };

    container.appendChild(div);
  });
}

// 🔄 EVENTOS AUTOMÁTICOS (UX melhor)
document.getElementById("busca").addEventListener("input", aplicarFiltros);
document.getElementById("filtroTipo").addEventListener("change", aplicarFiltros);
document.getElementById("filtroStatus").addEventListener("change", aplicarFiltros);

// 🗑️ EXCLUSÃO COMPLETA
window.excluir = async function(id) {

  if (!confirm("Deseja excluir completamente este registro?")) return;

  try {

    const qInspecao = query(
      collection(db, "inspecoes"),
      where("implementoId", "==", id)
    );

    const snapInspecao = await getDocs(qInspecao);

    for (const inspecaoDoc of snapInspecao.docs) {

      const inspecaoId = inspecaoDoc.id;

      const qItens = query(
        collection(db, "naoConformidades"),
        where("inspecaoId", "==", inspecaoId)
      );

      const snapItens = await getDocs(qItens);

      for (const item of snapItens.docs) {
        await deleteDoc(doc(db, "naoConformidades", item.id));
      }

      await deleteDoc(doc(db, "inspecoes", inspecaoId));
    }

    await deleteDoc(doc(db, "implementos", id));

    alert("Excluído com sucesso");

    carregar();

  } catch (e) {
    console.error(e);
    alert("Erro ao excluir");
  }
};


carregar();

import { carregarNavbar } from "./navbar.js";

carregarNavbar();

</script>

</body>
</html>
