  <!DOCTYPE html>
  <html lang="pt-br">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Geral</title>
  <link rel="stylesheet" href="navbar.css">

  <style>
  body { margin: 0; font-family: Arial; background: #f1f3f6; }

  .topbar {
    background: #1f2937;
    color: white;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Estilo Base do Botão */
  .auth-btn {
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }

  /* Cor quando for Logout */
  .btn-logout { background: #ff5252; color: white; }

  /* Cor quando for Login */
  .btn-login { background: #2196f3; color: white; }

  .acoes {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 20px;
  }

  .botao {
    background: white;
    border-radius: 20px;
    height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 16px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    transition: 0.2s;
    cursor: pointer;
  }
.topbar {
  background: #1f2937;
  color: white;

  padding: 15px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  position: relative;
}

/* Logo centralizada REAL */
.logo-topbar {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);

  height: 32px;
  object-fit: contain;
}

/* Grupo de botões da direita */
.topbar-acoes {
  display: flex;
  gap: 10px;
  align-items: center;
}

/* Evita texto esmagando a logo */
.titulo-topbar {
  min-width: 90px;
}
  .botao div { font-size: 28px; margin-bottom: 5px; }
  .botao:active { transform: scale(0.96); }
  </style>
  </head>

  <body>

  <body>

  <div class="topbar">

  <!-- Lado esquerdo -->
  <span class="titulo-topbar">🏠 Início</span>

  <!-- Logo central -->
  <img src="suzano-logo.png" class="logo-topbar">

  <!-- Lado direito -->
  <div class="topbar-acoes">

    <button id="btnInstalar"
      class="auth-btn btn-login"
      style="display: none;">
      📲 Instalar App
    </button>

    <button id="authBtn" class="auth-btn">
      Carregando...
    </button>

  </div>

</div>

  <div class="acoes">
    <div class="botao" onclick="ir('nova_inspecao.html')"><div>➕</div>Nova Inspeção</div>
    <div class="botao" onclick="ir('inspecao.html')"><div>🔍</div>Inspeção</div>
    <div class="botao" onclick="ir('manutencao.html')"><div>🔧</div>Manutenção</div>
    <div class="botao" onclick="ir('tecnico.html')"><div>🛠️</div>Técnico</div>
  </div>

  <!-- Link para o Manifesto -->
<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#1f2937">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="/icone-192.png">


  <!-- Cor da barra de status no Android -->
  <meta name="theme-color" content="#1f2937">

  <script type="module">
  import { auth } from "./firebase.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { carregarNavbar } from "./navbar.js";

import "./lista_solicitantes.js";

const LISTA_SOLICITANTES = window.LISTA_SOLICITANTES || [];

if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("PWA ativo"))
    .catch(err => console.log(err));

}

carregarNavbar(); 

  const authBtn = document.getElementById("authBtn");

  // --- OBSERVADOR DE USUÁRIO ---
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Usuário está LOGADO
      authBtn.innerText = "Sair 🚪";
      authBtn.className = "auth-btn btn-logout";
      authBtn.onclick = logout;
    } else {
      // Usuário está DESLOGADO
      authBtn.innerText = "Login 🔑";
      authBtn.className = "auth-btn btn-login";
      authBtn.onclick = () => window.location.href = "login.html"; // Ajuste para o nome da sua página de login
    }
  });

  // Função para Navegação
window.ir = async function(pagina) {

  // 🚛 Nova inspeção
  if (pagina === "nova_inspecao.html") {

    const nomesOptions = LISTA_SOLICITANTES
      .map(nome => `<option value="${nome}">`)
      .join("");

    const nome = await promptComLista(`
      <div style="text-align:left;">
      
        <label style="
          font-size:13px;
          font-weight:bold;
        ">
          Nome do inspetor
        </label>

        <input
          id="nomeInspetor"
          list="listaInspetores"
          placeholder="Digite o nome..."
          style="
            width:100%;
            padding:10px;
            margin-top:8px;
            border-radius:8px;
            border:1px solid #ccc;
            box-sizing:border-box;
          "
        >

        <datalist id="listaInspetores">
          ${nomesOptions}
        </datalist>

      </div>
    `);

    if (!nome) return;

    localStorage.setItem("inspetorAtual", nome);

    window.location =
      "nova_inspecao.html?inspetor=" +
      encodeURIComponent(nome);

    return;
  }

  // outras páginas
  window.location = pagina;
};

function promptComLista(html) {

  const overlay = document.createElement("div");

  overlay.style = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
  `;

  overlay.innerHTML = `
    <div style="
      background:white;
      padding:20px;
      border-radius:12px;
      width:90%;
      max-width:400px;
      box-sizing:border-box;
    ">

      ${html}

      <div style="
        display:flex;
        justify-content:flex-end;
        gap:10px;
        margin-top:20px;
      ">

        <button id="cancelarBtn">
          Cancelar
        </button>

        <button
          id="okBtn"
          style="
            background:#2196f3;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:6px;
          "
        >
          Continuar
        </button>

      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  return new Promise(resolve => {

    document
      .getElementById("cancelarBtn")
      .onclick = () => {

        overlay.remove();
        resolve(null);
      };

    document
      .getElementById("okBtn")
      .onclick = () => {

        const valor = document
          .getElementById("nomeInspetor")
          .value
          .trim();

        if (!valor) {
          alert("Digite o nome do inspetor");
          return;
        }

        overlay.remove();
        resolve(valor);
      };
  });
}

  // Lógica de Logout
  async function logout() {
    if (confirm("Deseja realmente sair do sistema?")) {
      try {
        await signOut(auth);
        alert("Você saiu!");
      } catch (error) {
        console.error("Erro ao sair:", error);
      }
    }
  }

    // Registra o Service Worker
if ('serviceWorker' in navigator) {

  navigator.serviceWorker.register('/sw.js', {
    scope: '/'
  })
  .then(() => {
    console.log("Service Worker Registrado!");
  })
  .catch(err => {
    console.error(err);
  });
}
    let gatilhoInstalacao; // Variável para guardar o evento

  const btnInstalar = document.getElementById('btnInstalar');

  // 1. Escuta o evento do navegador
  window.addEventListener('beforeinstallprompt', (e) => {
    // Impede que o navegador mostre o banner automático padrão
    e.preventDefault();
    // Guarda o evento para usar depois
    gatilhoInstalacao = e;
    // Mostra o seu botão customizado
    btnInstalar.style.display = 'block';
  });

  // 2. Lógica do clique no botão
  btnInstalar.addEventListener('click', async () => {
    if (!gatilhoInstalacao) return;

    // Mostra a janelinha de instalação original do sistema
    gatilhoInstalacao.prompt();

    // Verifica se o usuário aceitou ou recusou
    const { outcome } = await gatilhoInstalacao.userChoice;
    console.log(`Usuário escolheu: ${outcome}`);

    // Limpa o gatilho, pois ele só pode ser usado uma vez
    gatilhoInstalacao = null;
    // Esconde o botão após a escolha
    btnInstalar.style.display = 'none';
  });

  // 3. (Opcional) Detecta se o app já foi instalado
  window.addEventListener('appinstalled', () => {
    console.log('App instalado com sucesso!');
    btnInstalar.style.display = 'none';
  });
  </script>

  </body>
  </html>
