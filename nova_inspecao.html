<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nova Inspeção</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f3f6;
}

.topbar {
  background: #1f2937;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}

.container {
  padding: 12px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-primario { background: #2196f3; color: white; }
.btn-sucesso { background: #4caf50; color: white; }

.preview {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="topbar">➕ Nova Inspeção</div>

<div class="container">

<div class="card">
  <h3>Implemento</h3>

  <input id="placa" placeholder="Placa">

  <select id="tipo">
    <option value="">Tipo</option>
    <option value="carreta">Carreta</option>
    <option value="prancha">Prancha</option>
    <option value="comboio">Comboio</option>
    <option value="cavalo">Cavalo Mecânico</option>
  </select>

  <select id="tipoManutencao">
    <option value="">Tipo manutenção</option>
    <option value="preventiva">Preventiva</option>
    <option value="revisao">Revisão</option>
    <option value="cnpj">CNPJ</option>
    <option value="gm">GM</option>
  </select>

  <div id="kmField" style="display:none;">
    <input id="km" placeholder="KM">
  </div>

  <div id="horimetroField" style="display:none;">
    <input id="horimetro" placeholder="Horímetro">
  </div>

  <div id="compartimentosField" style="display:none;">
    <input id="compartimentos" type="number" placeholder="Qtd Compartimentos">
  </div>
</div>

<div class="card">
  <h3>Não Conformidade</h3>

  <input id="descricao" placeholder="Descrição">
  <input id="eixo" placeholder="Ex: 2º eixo">

  <select id="lado">
    <option value="">Lado</option>
    <option value="esquerdo">Esquerdo</option>
    <option value="direito">Direito</option>
  </select>

  <select id="tipoItem">
    <option value="normal">Normal</option>
    <option value="avaria">Avaria</option>
  </select>

  <div id="compartimentoItem" style="display:none;">
    <input id="compartimentoItemInput" type="number" placeholder="Compartimento">
  </div>

  <input type="file" id="foto" accept="image/*" capture="environment">
  <img id="preview" class="preview" style="display:none;">

  <button class="btn-primario" onclick="adicionarItem()">Adicionar Item</button>

  <div id="listaItens"></div>
</div>

<button class="btn-sucesso" onclick="criar()">Finalizar Inspeção</button>

</div>

<script type="module">

import { db, storage } from "./firebase.js";
import {
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// 🔥 CARREGAMENTO DO JSON
let plano = [];
let planoCarregado = false;

fetch("./plano_manutencao.json")
  .then(res => res.json())
  .then(data => {
    plano = data;
    planoCarregado = true;
    console.log("Plano carregado:", plano.length);
  })
  .catch(err => console.error("Erro ao carregar plano:", err));

let naoConformidades = [];
let fotoFile = null;

// 🔥 CONFIG
const configTipo = {
  carreta: { km: false, horimetro: false, compartimentos: true },
  prancha: { km: false, horimetro: false, compartimentos: false },
  comboio: { km: true, horimetro: true, compartimentos: false },
  cavalo: { km: true, horimetro: false, compartimentos: false }
};

// 🔄 CONTROLE UI
document.getElementById("tipo").addEventListener("change", () => {

  const tipo = document.getElementById("tipo").value;
  const cfg = configTipo[tipo] || {};

  document.getElementById("kmField").style.display = cfg.km ? "block" : "none";
  document.getElementById("horimetroField").style.display = cfg.horimetro ? "block" : "none";
  document.getElementById("compartimentosField").style.display = cfg.compartimentos ? "block" : "none";
  document.getElementById("compartimentoItem").style.display = cfg.compartimentos ? "block" : "none";
});

// 📸 PREVIEW
document.getElementById("foto").addEventListener("change", (e) => {
  fotoFile = e.target.files[0];

  if (!fotoFile) return;

  const preview = document.getElementById("preview");
  preview.src = URL.createObjectURL(fotoFile);
  preview.style.display = "block";
});

// 🔥 CHECKLIST AUTOMÁTICO
function gerarChecklistAutomatico(horimetro) {

  if (!plano.length) return [];

  const todasHoras = [...new Set(
    plano.flatMap(item => item.horas.map(h => h.hora))
  )].sort((a,b) => a - b);

  const marco = todasHoras.filter(h => h <= horimetro).pop();

  if (!marco) return [];

  return plano.map(item => {

    const acao = item.horas.find(h => h.hora === marco);
    if (!acao) return null;

    return {
      grupo: item.grupo, // 🔥 AQUI ESTÁ O PULO DO GATO
      descricao: item.descricao,
      eixo: "",
      lado: "",
      tipo: acao.tipo === "T" ? "troca" : "vistoria",
      compartimento: null,
      fotos: [],
      resolvido: false
    };

  }).filter(Boolean);
}

function agruparPorGrupo(lista) {

  const grupos = {};

  lista.forEach(item => {

    const grupo = item.grupo || "GERAL";

    if (!grupos[grupo]) {
      grupos[grupo] = [];
    }

    grupos[grupo].push(item);
  });

  return grupos;
}

// 🔥 AUTO PREENCHIMENTO
document.getElementById("horimetro").addEventListener("input", () => {

  const valor = Number(document.getElementById("horimetro").value);

  if (!valor) return;

  if (!planoCarregado) {
    console.log("Plano ainda não carregado");
    return;
  }

  const checklist = gerarChecklistAutomatico(valor);

  if (!checklist.length) {
    console.log("Nenhum item para esse horímetro");
    return;
  }

  naoConformidades = [...checklist];

  renderLista();
});

// 📋 LISTA
function renderLista() {

  const container = document.getElementById("listaItens");
  container.innerHTML = "";

  const grupos = agruparPorGrupo(naoConformidades);

  Object.entries(grupos).forEach(([grupo, itensGrupo]) => {

    // 🔥 HEADER DO GRUPO
    const header = document.createElement("div");
    header.style.background = "#1f2937";
    header.style.color = "white";
    header.style.padding = "8px";
    header.style.borderRadius = "6px";
    header.style.marginTop = "10px";
    header.innerText = grupo;

    container.appendChild(header);

    itensGrupo.forEach((item, i) => {

      const fotosHTML = (item.fotos || []).map(f =>
        `<img src="${f}" class="preview">`
      ).join("");

      const div = document.createElement("div");
      div.style.padding = "8px";

      div.innerHTML = `
        <strong>${item.descricao}</strong><br>
        ${item.eixo || "-"} - ${item.lado || "-"}
        <br>Tipo: ${item.tipo}
        ${fotosHTML}
        <button onclick="remover(${i})">Remover</button>
        <hr>
      `;

      container.appendChild(div);
    });

  });
}

window.remover = function(i) {
  naoConformidades.splice(i, 1);
  renderLista();
};

// 🚀 CRIAR
window.criar = async function() {

  const placa = document.getElementById("placa").value.trim();
  const tipo = document.getElementById("tipo").value;
  const tipoManutencao = document.getElementById("tipoManutencao").value;
  const km = document.getElementById("km").value;
  const horimetro = document.getElementById("horimetro").value;
  const compartimentos = document.getElementById("compartimentos").value;

  const cfg = configTipo[tipo];

  if (!placa || !tipo || !tipoManutencao) {
    alert("Preencha os dados obrigatórios");
    return;
  }

  if (cfg.compartimentos && !compartimentos) return alert("Informe os compartimentos");
  if (cfg.km && !km) return alert("Informe o KM");
  if (cfg.horimetro && !horimetro) return alert("Informe o horímetro");

  if (!naoConformidades.length) {
    alert("Adicione ao menos uma não conformidade");
    return;
  }

  const agora = serverTimestamp();

  const implementoRef = await addDoc(collection(db, "implementos"), {
    placa,
    tipo,
    status: "em_inspecao",
    dataInspecao: agora,
    tipoManutencao
  });

  const inspecaoRef = await addDoc(collection(db, "inspecoes"), {
    implementoId: implementoRef.id,
    km: km ? Number(km) : null,
    horimetro: horimetro ? Number(horimetro) : null,
    compartimentos: compartimentos ? Number(compartimentos) : 0,
    criadoEm: agora
  });

  for (const item of naoConformidades) {
    await addDoc(collection(db, "naoConformidades"), {
      ...item,
      inspecaoId: inspecaoRef.id
    });
  }

  alert("Inspeção criada!");
  window.location = "detalhe.html?id=" + implementoRef.id;
};

</script>
</body>
</html>
