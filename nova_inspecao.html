<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nova Inspeção</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f3f6;
}

.topbar {
  background: #1f2937;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}

.container {
  padding: 12px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-primario { background: #2196f3; color: white; }
.btn-sucesso { background: #4caf50; color: white; }

.preview {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="topbar">➕ Nova Inspeção</div>

<div class="container">

<!-- IMPLEMENTO -->
<div class="card">
  <h3>Implemento</h3>

  <input id="placa" placeholder="Placa">

  <select id="tipo">
    <option value="">Tipo</option>
    <option value="carreta">Carreta</option>
    <option value="comboio">Comboio</option>
    <option value="cavalo">Cavalo Mecânico</option>
  </select>

  <select id="tipoManutencao">
    <option value="">Tipo manutenção</option>
    <option value="preventiva">Preventiva</option>
    <option value="revisao">Revisão</option>
    <option value="cnpj">CNPJ</option>
    <option value="gm">GM</option>
  </select>

  <div id="kmField" style="display:none;">
    <input id="km" placeholder="KM">
  </div>

  <div id="horimetroField" style="display:none;">
    <input id="horimetro" placeholder="Horímetro">
  </div>

  <div id="compartimentosField" style="display:none;">
    <input id="compartimentos" type="number" placeholder="Qtd Compartimentos">
  </div>
</div>

<!-- NÃO CONFORMIDADE -->
<div class="card">
  <h3>Não Conformidade</h3>

  <input id="descricao" placeholder="Descrição">
  <input id="eixo" placeholder="Ex: 2º eixo">

  <select id="lado">
    <option value="">Lado</option>
    <option value="esquerdo">Esquerdo</option>
    <option value="direito">Direito</option>
  </select>

  <select id="tipoItem">
    <option value="normal">Normal</option>
    <option value="avaria">Avaria</option>
  </select>

  <div id="compartimentoItem" style="display:none;">
    <input id="compartimentoItemInput" type="number" placeholder="Compartimento">
  </div>

  <!-- FOTO -->
  <input type="file" id="foto" accept="image/*" capture="environment">
  <img id="preview" class="preview" style="display:none;">

  <button class="btn-primario" onclick="adicionarItem()">Adicionar Item</button>

  <div id="listaItens"></div>
</div>

<button class="btn-sucesso" onclick="criar()">Finalizar Inspeção</button>

</div>

<script type="module">

import { db, storage } from "./firebase.js";
import {
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

let naoConformidades = [];
let fotoFile = null;

// 🔄 CONTROLE POR TIPO
document.getElementById("tipo").addEventListener("change", () => {

  const tipo = document.getElementById("tipo").value;

  document.getElementById("kmField").style.display = "none";
  document.getElementById("horimetroField").style.display = "none";
  document.getElementById("compartimentosField").style.display = "none";
  document.getElementById("compartimentoItem").style.display = "none";

  if (tipo === "carreta") {
    document.getElementById("compartimentosField").style.display = "block";
    document.getElementById("compartimentoItem").style.display = "block";
  }

  if (tipo === "comboio") {
    document.getElementById("kmField").style.display = "block";
    document.getElementById("horimetroField").style.display = "block";
  }

  if (tipo === "cavalo") {
    document.getElementById("kmField").style.display = "block";
  }
});

// 📸 preview
document.getElementById("foto").addEventListener("change", (e) => {
  fotoFile = e.target.files[0];

  if (!fotoFile) return;

  const preview = document.getElementById("preview");
  preview.src = URL.createObjectURL(fotoFile);
  preview.style.display = "block";
});

// ➕ adicionar item
window.adicionarItem = async function() {

  const descricao = document.getElementById("descricao").value.trim();
  const eixo = document.getElementById("eixo").value.trim();
  const lado = document.getElementById("lado").value;
  const tipo = document.getElementById("tipoItem").value;
  const compartimento = document.getElementById("compartimentoItemInput")?.value;

  if (!descricao || !eixo || !lado) {
    alert("Preencha todos os campos do item");
    return;
  }

  let fotos = [];

  try {
    if (fotoFile) {
      const nome = `avarias/${Date.now()}.jpg`;
      const storageRef = ref(storage, nome);

      await uploadBytes(storageRef, fotoFile);

      const url = await getDownloadURL(storageRef);
      fotos.push(url);
    }
  } catch (e) {
    console.error("Erro upload:", e);
    alert("Erro ao enviar imagem (verifique CORS do Storage)");
  }

  naoConformidades.push({
    descricao,
    eixo,
    lado,
    tipo,
    compartimento: compartimento ? Number(compartimento) : null,
    fotos,
    resolvido: false
  });

  renderLista();
  limparCampos();
};

// 🧹 limpar
function limparCampos() {
  document.getElementById("descricao").value = "";
  document.getElementById("eixo").value = "";
  document.getElementById("lado").value = "";
  
  const comp = document.getElementById("compartimentoItemInput");
  if (comp) comp.value = "";

  document.getElementById("foto").value = "";
  document.getElementById("preview").style.display = "none";
  fotoFile = null;
}

// 📋 lista
function renderLista() {

  const container = document.getElementById("listaItens");
  container.innerHTML = "";

  naoConformidades.forEach((item, i) => {

    const fotosHTML = (item.fotos || []).map(f =>
      `<img src="${f}" class="preview">`
    ).join("");

    const div = document.createElement("div");

    div.innerHTML = `
      <strong>${item.descricao}</strong><br>
      ${item.eixo} - ${item.lado}
      ${item.compartimento ? " | Comp: " + item.compartimento : ""}
      <br>Tipo: ${item.tipo}
      ${fotosHTML}
      <button onclick="remover(${i})">Remover</button>
      <hr>
    `;

    container.appendChild(div);
  });
}

window.remover = function(i) {
  naoConformidades.splice(i, 1);
  renderLista();
};

// 🚀 criar inspeção
window.criar = async function() {

  const placa = document.getElementById("placa").value.trim();
  const tipo = document.getElementById("tipo").value;
  const tipoManutencao = document.getElementById("tipoManutencao").value;
  const km = document.getElementById("km").value;
  const horimetro = document.getElementById("horimetro").value;
  const compartimentos = document.getElementById("compartimentos").value;

  if (!placa || !tipo || !tipoManutencao) {
    alert("Preencha os dados obrigatórios");
    return;
  }

  if (tipo === "carreta" && !compartimentos) {
    alert("Informe os compartimentos");
    return;
  }

  if (tipo === "comboio" && (!km || !horimetro)) {
    alert("Informe KM e horímetro");
    return;
  }

  if (tipo === "cavalo" && !km) {
    alert("Informe o KM");
    return;
  }

  if (naoConformidades.length === 0) {
    alert("Adicione ao menos uma não conformidade");
    return;
  }

  const agora = serverTimestamp();

  const implementoRef = await addDoc(collection(db, "implementos"), {
    placa,
    tipo,
    status: "em_inspecao",
    dataInspecao: agora,
    tipoManutencao
  });

  const inspecaoRef = await addDoc(collection(db, "inspecoes"), {
    implementoId: implementoRef.id,
    km: km ? Number(km) : null,
    horimetro: horimetro ? Number(horimetro) : null,
    compartimentos: compartimentos ? Number(compartimentos) : 0,
    criadoEm: agora
  });

  for (const item of naoConformidades) {
    await addDoc(collection(db, "naoConformidades"), {
      ...item,
      inspecaoId: inspecaoRef.id
    });
  }

  alert("Inspeção criada!");
  window.location = "detalhe.html?id=" + implementoRef.id;
};

</script>

</body>
</html>
