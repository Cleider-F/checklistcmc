<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Execução da Manutenção</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f3f6;
}

.topbar {
  background: #1f2937;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}

.container {
  padding: 12px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* ITEM */
.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.item-texto {
  flex: 1;
}

.resolvido {
  text-decoration: line-through;
  color: green;
}

/* BOTÃO */
.acao {
  font-size: 22px;
  cursor: pointer;
  margin-left: 10px;
  min-width: 30px;
  text-align: center;
}

/* FOTOS */
.fotos {
  margin-top: 6px;
}

.fotos img {
  width: 70px;
  border-radius: 6px;
  margin-right: 6px;
  margin-top: 4px;
}

/* BOTÕES */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-alerta { background: #ff9800; color: white; }
.btn-sucesso { background: #4caf50; color: white; }

</style>
</head>

<body>

<div class="topbar">🔧 Execução da Manutenção</div>

<div class="container">

  <div id="info" class="card"></div>

  <div class="card">
    <h3>Checklist</h3>
    <div id="itens"></div>
  </div>

  <button class="btn-alerta" id="btnIniciar" onclick="iniciar()">
    Iniciar Manutenção
  </button>

  <button class="btn-sucesso" id="btnFinalizar" onclick="finalizar()">
    Finalizar Manutenção
  </button>

</div>

<div id="modalImg" style="
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:999;
">
  <img id="imgGrande" style="max-width:90%; max-height:90%; border-radius:10px;">
</div>

<link rel="stylesheet" href="navbar.css">

<script type="module">

import { db } from "./firebase.js";
import {
  doc, getDoc, collection, query, where, getDocs, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { storage } from "./firebase.js";
import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const id = new URLSearchParams(window.location.search).get("id");

let itens = [];
let implemento = null;

// REGRAS
const podeIniciar = s => s === "aguardando_manutencao";
const podeMexerItens = s => s === "em_manutencao";
const podeFinalizar = s => s === "em_manutencao";

// 🚀 CARREGAR
async function carregar() {

  const snap = await getDoc(doc(db, "implementos", id));
  implemento = snap.data();

  document.getElementById("info").innerHTML = `
    <strong>${implemento?.placa || "-"}</strong><br>
    ${implemento?.tipo || "-"}<br>
    Status: ${implemento?.status || "-"}
  `;

  document.getElementById("btnIniciar").style.display =
    podeIniciar(implemento.status) ? "block" : "none";

  document.getElementById("btnFinalizar").style.display =
    podeFinalizar(implemento.status) ? "block" : "none";

  // 🔎 pegar inspeção
  const qInspecao = query(
    collection(db, "inspecoes"),
    where("implementoId", "==", id)
  );

  const snapInspecao = await getDocs(qInspecao);

  let inspecaoId = null;
  snapInspecao.forEach(d => inspecaoId = d.id);

  if (!inspecaoId) return;

  // 🔎 pegar itens
  const qItens = query(
    collection(db, "naoConformidades"),
    where("inspecaoId", "==", inspecaoId)
  );

  const snapItens = await getDocs(qItens);

  const container = document.getElementById("itens");
  container.innerHTML = "";

  itens = [];

  snapItens.forEach(docSnap => {

    const item = { id: docSnap.id, ...docSnap.data() };
    itens.push(item);

    let listaFotos = [];

if (item.fotos && Array.isArray(item.fotos)) {
  listaFotos = item.fotos;
} else if (item.foto) {
  listaFotos = [item.foto];
}

const fotos = listaFotos.map(url =>
  `<img src="${url}" onclick="abrirImagem('${url}')" onerror="this.style.display='none'">`
).join("");

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="item-texto ${item.resolvido ? "resolvido" : ""}" id="txt-${item.id}">
        <strong>${item.descricao}</strong><br>
        ${item.eixo} - ${item.lado}
        ${item.compartimento ? " | Comp: " + item.compartimento : ""}
        <br>Tipo: ${item.tipo}
        <div class="fotos">${fotos}</div>
      </div>

      <div class="acao"
        style="${!podeMexerItens(implemento.status) ? 'opacity:0.4;pointer-events:none;' : ''}"
        onclick="toggle('${item.id}')">
        ${item.resolvido ? "❌" : "✔️"}
      </div>
    `;

    container.appendChild(div);
  });

}

carregar();

// 🔁 TOGGLE SEM RELOAD
window.toggle = async function(itemId) {

  if (!podeMexerItens(implemento.status)) return;

  const item = itens.find(i => i.id === itemId);
  if (!item) return;

  const novo = !item.resolvido;

  await updateDoc(doc(db, "naoConformidades", itemId), {
    resolvido: novo
  });

  // 🔥 atualização imediata (sem recarregar tudo)
  item.resolvido = novo;

  const el = document.getElementById("txt-" + itemId);
  const btn = el.parentElement.querySelector(".acao");

  el.classList.toggle("resolvido", novo);
  btn.innerHTML = novo ? "❌" : "✔️";
};

// ▶ INICIAR
window.iniciar = async function() {

  if (!podeIniciar(implemento.status)) return;

  await updateDoc(doc(db, "implementos", id), {
    status: "em_manutencao"
  });

  location.reload();
};

window.abrirImagem = function(url) {
  document.getElementById("modalImg").style.display = "flex";
  document.getElementById("imgGrande").src = url;
};

document.getElementById("modalImg").onclick = function() {
  this.style.display = "none";
};

// ✅ FINALIZAR
window.finalizar = async function() {

  if (!podeFinalizar(implemento.status)) return;

  const pendentes = itens.filter(i => !i.resolvido);

  if (pendentes.length > 0) {
    const motivo = prompt("Itens pendentes. Informe o motivo:");
    if (!motivo) return;
  }

  await updateDoc(doc(db, "implementos", id), {
    status: "liberado"
  });

  window.location = "manutencao.html";
};

import { carregarNavbar } from "./navbar.js";
carregarNavbar();

</script>

</body>
</html>
