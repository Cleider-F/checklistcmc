<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f3f6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 320px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h3 {
  margin-top: 0;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #2196f3;
  color: white;
  border: none;
  margin-top: 5px;
}

.link {
  text-align: center;
  margin-top: 10px;
  color: #2196f3;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="card">

  <!-- LOGIN -->
  <div id="loginBox">
    <h3>Login</h3>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <div class="link" onclick="mostrarCadastro()">Criar conta</div>
  </div>

  <!-- CADASTRO -->
  <div id="cadastroBox" style="display:none;">
    <h3>Criar conta</h3>

    <input id="nomeCad" placeholder="Nome">
    <input id="emailCad" placeholder="Email">
    <input id="senhaCad" type="password" placeholder="Senha">

    <select id="tipoCad">
      <option value="inspetor">Inspetor</option>
      <option value="tecnico">Técnico</option>
    </select>

    <button onclick="cadastrar()">Cadastrar</button>

    <div class="link" onclick="mostrarLogin()">Voltar</div>
  </div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔁 alternar telas
window.mostrarCadastro = () => {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("cadastroBox").style.display = "block";
};

window.mostrarLogin = () => {
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("cadastroBox").style.display = "none";
};

// 🔐 LOGIN
window.login = async function() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {

    await signInWithEmailAndPassword(auth, email, senha);

    window.location = "index.html";

  } catch (e) {
    alert("Erro no login");
    console.error(e);
  }
};

// 🧾 CADASTRO
window.cadastrar = async function() {

  const nome = document.getElementById("nomeCad").value.trim();
  const email = document.getElementById("emailCad").value.trim();
  const senha = document.getElementById("senhaCad").value;
  const tipo = document.getElementById("tipoCad").value;

  if (!nome || !email || !senha) {
    alert("Preencha todos os campos");
    return;
  }

  try {

    // 🔐 cria no Auth
    const userCred = await createUserWithEmailAndPassword(auth, email, senha);

    const uid = userCred.user.uid;

    // 📦 salva no Firestore
    await setDoc(doc(db, "usuarios", uid), {
      nome,
      email,
      tipo
    });

    alert("Conta criada com sucesso!");

    mostrarLogin();

  } catch (e) {
    console.error(e);
    alert("Erro ao cadastrar");
  }

};

</script>

</body>
</html>
