<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f3f6;
  display: flex;
  flex-direction: column; /* Ajustado para alinhar o botão home no topo */
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Estilo do Botão Home */
.btn-home {
  position: absolute;
  top: 20px;
  left: 20px;
  background: #1f2937;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
  width: auto; /* Para não ocupar a largura toda */
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 320px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h3 { margin-top: 0; }

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  box-sizing: border-box; /* Evita que o padding "estoure" a largura */
}

button {
  width: 100%;
  padding: 10px;
  background: #2196f3;
  color: white;
  border: none;
  margin-top: 5px;
  border-radius: 5px;
  cursor: pointer;
}

.btn-alerta { background: #ff9800; }
.btn-sucesso { background: #4caf50; }

hr { margin: 20px 0; border: 0; border-top: 1px solid #eee; }

.topbar {
    font-weight: bold;
    margin-bottom: 15px;
    text-align: center;
    color: #333;
}
.topbar {
  background: #1f2937;
  color: white;

  padding: 15px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  position: relative;
}

/* Logo centralizada REAL */
.logo-topbar {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);

  height: 32px;
  object-fit: contain;
}

/* Grupo de botões da direita */
.topbar-acoes {
  display: flex;
  gap: 10px;
  align-items: center;
}

/* Evita texto esmagando a logo */
.titulo-topbar {
  min-width: 90px;
}
</style>

</head>

<body>

<!-- BOTÃO HOME -->
<button class="btn-home" onclick="window.location.href='index.html'">
    🏠 Home
</button>

<div class="card">
    <div class="topbar">🔐 Acesso ao Sistema</div>
<!-- Logo central -->
  <img src="suzano-logo.png" class="logo-topbar">
    <!-- BOX DE LOGIN -->
    <div id="loginBox">
        <h3>Login</h3>
        
        <input id="email" placeholder="Email">
        <input id="senha" type="password" placeholder="Senha">

        <button onclick="login()">Entrar</button>
        <button
  onclick="recuperarSenha()"
  style="
    background:none;
    color:#2196f3;
    border:none;
    font-size:13px;
    margin-top:8px;
    cursor:pointer;
  "
>
  Esqueci minha senha
</button>
        <hr>
        <button class="btn-alerta" onclick="mostrarCadastro()">Criar conta</button>
    </div>

    <!-- BOX DE CADASTRO -->
    <div id="cadastroBox" style="display:none">
        <h3>Cadastro</h3>
        <input id="nome" placeholder="Nome">
        <input id="emailCadastro" placeholder="Email">
        <input id="senhaCadastro" type="password" placeholder="Senha">

        <select id="tipoUsuario">
            <option value="inspetor">Inspetor</option>
            <option value="tecnico">Técnico</option>
        </select>

        <button class="btn-sucesso" onclick="cadastrar()">Criar Conta</button>
        <button style="background:none; color:#666; font-size:12px;" onclick="mostrarLogin()">Voltar ao login</button>
    </div>
</div>

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#1f2937">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="/icone-192.png">

<script type="module">
import { auth, db } from "./firebase.js";
import { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("PWA ativo"))
    .catch(err => console.log(err));

}

// Alternar telas
window.mostrarCadastro = () => {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("cadastroBox").style.display = "block";
};

window.mostrarLogin = () => {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("cadastroBox").style.display = "none";
};

// LOGIN
window.login = async function() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    try {
        await signInWithEmailAndPassword(auth, email, senha);
        window.location = "index.html";
    } catch (e) {
        alert("Erro no login: Verifique e-mail e senha.");
    }
};

// CADASTRO
window.cadastrar = async function() {
    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("emailCadastro").value.trim();
    const senha = document.getElementById("senhaCadastro").value;
    const tipo = document.getElementById("tipoUsuario").value;

    if (!nome || !email || !senha) {
        alert("Preencha todos os campos");
        return;
    }

    try {
        const userCred = await createUserWithEmailAndPassword(auth, email, senha);
        const uid = userCred.user.uid;

        await setDoc(doc(db, "usuarios", uid), { nome, email, tipo });

        alert("Conta criada com sucesso!");
        mostrarLogin();
    } catch (e) {
        console.error(e);
        alert("Erro ao cadastrar: " + e.message);
    }
};

window.recuperarSenha = async function() {

    const email = document.getElementById("email").value.trim();

    if (!email) {
        alert("Digite seu e-mail para recuperar a senha.");
        return;
    }

    try {

        await sendPasswordResetEmail(auth, email);

        alert("Link de recuperação enviado para o e-mail.");

    } catch (e) {

        console.error(e);

        alert("Erro ao enviar recuperação de senha.");
    }
};
</script>

</body>
</html>
