<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Inspeção</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f3f6;
}

.topbar {
  background: #1f2937;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}

.contadores {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: white;
}

.contador {
  text-align: center;
}

.azul { color: #2196f3; }
.laranja { color: #ff9800; }
.amarelo { color: #ffc107; }
.verde { color: #4caf50; }

.lista {
  padding: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.card:active {
  transform: scale(0.97);
}

.card-top {
  display: flex;
  justify-content: space-between;
}

.placa {
  font-size: 18px;
  font-weight: bold;
}

.status {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: white;
}

.status.azul { background: #2196f3; }
.status.laranja { background: #ff9800; }
.status.amarelo { background: #ffc107; color: black; }
.status.verde { background: #4caf50; }

.info {
  margin-top: 5px;
  color: #555;
}

.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #2196f3;
  color: white;
  border: none;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  font-size: 30px;
}

</style>

</head>

<body>

<div class="topbar">
  🚛 Inspeção
</div>


<div class="lista" id="lista"></div>

<button class="fab" onclick="nova()">+</button>

<link rel="stylesheet" href="navbar.css">

<script type="module">

import { protegerPagina } from "./auth.js";

protegerPagina(["inspetor", "tecnico"]);

import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🎨 STATUS
function getStatusInfo(status) {
  switch(status) {
    case "em_inspecao": return { nome: "Inspeção", cor: "azul" };
    case "aguardando_manutencao": return { nome: "Aguardando", cor: "laranja" };
    case "em_manutencao": return { nome: "Manutenção", cor: "amarelo" };
    case "liberado": return { nome: "Liberado", cor: "verde" };
  }
}

// 🔢 CONTADORES
function atualizarContadores(lista) {

  const cont = {
    em_inspecao: 0,
    aguardando_manutencao: 0,
    em_manutencao: 0,
    liberado: 0
  };

  lista.forEach(i => cont[i.status]++);

  document.getElementById("contadores").innerHTML = `
    <div class="contador azul"><strong>${cont.em_inspecao}</strong>Inspeção</div>
    <div class="contador laranja"><strong>${cont.aguardando_manutencao}</strong>Aguardando</div>
    <div class="contador amarelo"><strong>${cont.em_manutencao}</strong>Manutenção</div>
    <div class="contador verde"><strong>${cont.liberado}</strong>Liberado</div>
  `;
}

// 🚀 LISTA FILTRADA (SÓ INSPEÇÃO)
const q = query(
  collection(db, "implementos"),
  where("status", "==", "em_inspecao")
);

onSnapshot(q, (snapshot) => {

  const lista = [];
  const container = document.getElementById("lista");
  container.innerHTML = "";

  snapshot.forEach(doc => {

    const data = doc.data();
    lista.push(data);

    const status = getStatusInfo(data.status);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="card-top">
        <div class="placa">${data.placa}</div>
        <div class="status ${status.cor}">
          ${status.nome}
        </div>
      </div>

      <div class="info">
        Tipo: ${data.tipo}
      </div>
    `;

    div.onclick = () => {
      window.location = "detalhe.html?id=" + doc.id;
    };

    container.appendChild(div);

  });

  atualizarContadores(lista);

});

// ➕ nova inspeção
window.nova = function() {
  window.location = "nova_inspecao.html";
}
import { carregarNavbar } from "./navbar.js";

carregarNavbar();
</script>

</body>
</html>
